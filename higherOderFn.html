    //higher order function
    function add(a,b){
        return a+b;

    //map function
    var num=[1,2,3,4,5];
    var result=num.map(n=> n*2);
    console.log(result);
    //filter function
    var result2=num.filter(n=> n%2==0);
    console.log(result2);
    //reduce function
    var result3=num.reduce((acc,n)=> acc+n,0);

    //_____________________________________________________________________________________________________________
    //promise: a promise is an object that represents the eventual completion (or failure) of an asynchronous operation and its resulting value.
    //promise has three states: pending, fulfilled, rejected
    var promise=new Promise((resolve,reject)=>{
        let sucess=true;
        if(sucess){
            resolve("promise is resolved");
        }
        else{
            reject("promise is rejected");
        }
    });
    promise.then(result=> console.log(result)).catch(error=> console.log(error));
    //then is use to handle the resolved value of the promise and catch is use to handle the rejected value of the promise
    //_____________________________________________________________________________________________________________
    //async await: async function is a function that is declared with the async keyword and allows the use of await keyword inside it. await keyword is used to wait for a promise to be resolved or rejected before proceeding with the execution of the code.
    async function fetchData(){
        try{
            let response=await fetch('https://jsonplaceholder.typicode.com/posts/1');
            let data=await response.json();
            console.log(data);
        }
        catch(error){
            console.log(error);
        }
    }
    fetchData();
